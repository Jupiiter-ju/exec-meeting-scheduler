<style>
  :root {
    --ink: #14202B; --slate: #51606D; --slate-light: #8A98A5;
    --card-bg: #FFFFFF; --border: #D6E0E8;
    --silver: #C7D0D9; --silver-light: #EDF0F3;
    --navy-deep: #0B1E36; --navy: #163257; --blue: #2C5C88; --blue-bright: #4E8FC0; --cyan: #7FD0E8;
    --blue-tint: #EAF4F9;
    --gradient-metal: linear-gradient(135deg, #C7D0D9 0%, #7FD0E8 35%, #4E8FC0 65%, #163257 100%);
    --gradient-blue: linear-gradient(135deg, #7FD0E8 0%, #4E8FC0 45%, #2C5C88 100%);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: 'Prompt', 'Segoe UI', 'Sarabun', system-ui, sans-serif;
    color: var(--ink); padding: 24px 16px 60px; min-height: 100vh; position: relative;
    background-color: #0B1E36;
    background-image:
      radial-gradient(1100px 750px at 15% 10%, rgba(127,208,232,.28), transparent 60%),
      radial-gradient(1100px 900px at 40% 92%, rgba(78,143,192,.35), transparent 60%),
      linear-gradient(155deg, #0B1E36 0%, #163257 45%, #0E2440 100%);
    background-size: 220% 220%, 220% 220%, 100% 100%;
    background-repeat: no-repeat;
    animation: silkDriftBlue 95s ease-in-out infinite alternate;
  }
  @keyframes silkDriftBlue {
    0%   { background-position: 0% 10%,  40% 100%, 0 0; }
    50%  { background-position: 25% 30%, 55% 75%,  0 0; }
    100% { background-position: 15% 45%, 60% 90%,  0 0; }
  }
  .lines-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  @media (prefers-reduced-motion: reduce) { body, .pulse { animation: none !important; } }

  .mockup-badge {
    position: fixed; top: 14px; right: 14px; z-index: 5;
    background: rgba(11,30,54,.8); color: #fff; font-size: 12px; font-weight: 500;
    padding: 6px 12px; border-radius: 999px; letter-spacing: .2px;
  }
  .wrap { max-width: 640px; margin: 0 auto; position: relative; z-index: 1; }
  h1 {
    font-size: 25px; font-weight: 700; margin: 0 0 4px; letter-spacing: .3px;
    background: var(--gradient-blue); -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .sub { color: rgba(237,240,243,.75); font-size: 14px; margin-bottom: 24px; font-weight: 300; }
  .card {
    position: relative; overflow: hidden; background: var(--card-bg);
    border: 1px solid var(--border); border-radius: 18px; padding: 24px 20px 20px; margin-bottom: 16px;
    box-shadow: 0 18px 40px -18px rgba(11,30,54,.55), 0 1px 2px rgba(0,0,0,.05);
  }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--gradient-metal); }
  .step-title { font-weight: 600; font-size: 15px; margin-bottom: 14px; color: var(--ink); }
  label { display: block; font-size: 13px; font-weight: 500; margin: 12px 0 6px; color: var(--slate); }
  label:first-child { margin-top: 0; }
  input[type=text], input[type=date] {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px;
    font-size: 14px; font-family: inherit; background: #F9FBFC; color: var(--ink);
  }
  .exec-options { display: flex; gap: 10px; flex-wrap: wrap; }
  .exec-chip {
    flex: 1; min-width: 120px; border: 1.5px solid var(--border); border-radius: 12px; padding: 12px;
    text-align: center; font-size: 14px; font-weight: 500; color: var(--slate); background: #F9FBFC;
  }
  .exec-chip.selected { border-color: transparent; background: var(--gradient-blue); color: #fff; font-weight: 600; }
  button {
    background: var(--gradient-blue); color: #fff; border: none; padding: 12px 20px; border-radius: 12px;
    font-size: 15px; font-family: inherit; font-weight: 600; width: 100%; margin-top: 16px;
    box-shadow: 0 10px 22px -10px rgba(44,92,136,.6);
  }
</style>
</head>
